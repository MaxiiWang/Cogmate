<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Visual - Tree View</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #17181c;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
            color: #e8e4dc;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 50% at 15% 5%, rgba(212,160,84,0.03) 0%, transparent 60%),
                radial-gradient(ellipse 50% 70% at 85% 95%, rgba(109,168,155,0.02) 0%, transparent 60%);
            pointer-events: none;
        }

        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 56px;
            background: rgba(30,32,37,0.85);
            backdrop-filter: blur(16px) saturate(1.2);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; padding: 0 24px; z-index: 100;
        }
        .logo { font-family: 'Playfair Display', Georgia, serif; font-size: 1.15em; font-weight: 700; color: #e2b96a; text-decoration: none; }
        .logo span { color: #e8e4dc; font-weight: 500; }
        .nav-tabs { display: flex; margin-left: 36px; gap: 2px; }
        .nav-tab {
            padding: 6px 14px; border-radius: 6px; color: #6b665e;
            cursor: pointer; transition: all 0.15s; text-decoration: none; font-size: 0.85em; font-weight: 500;
        }
        .nav-tab:hover { color: #a8a299; background: rgba(255,255,255,0.04); }
        .nav-tab.active { color: #e2b96a; background: rgba(212,160,84,0.12); }

        .main-content {
            padding-top: 76px; padding-bottom: 40px;
            max-width: 1300px; margin: 0 auto;
            display: flex; gap: 28px;
            padding-left: 24px; padding-right: 24px;
        }

        .tree-container { flex: 1; min-width: 0; }

        .tree-header { margin-bottom: 24px; }
        .tree-header h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.6em; font-weight: 700;
            color: #e8e4dc; margin-bottom: 6px;
            letter-spacing: -0.02em;
        }
        .tree-header p { color: #6b665e; font-size: 0.88em; }

        .tree-root { padding-left: 0; }
        .tree-node { margin-bottom: 12px; }

        .abstract-card {
            background: #1e2025;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        .abstract-card:hover {
            border-color: rgba(255,255,255,0.1);
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        .abstract-header {
            padding: 18px 20px;
            cursor: pointer;
            display: flex; align-items: flex-start; gap: 14px;
        }

        .expand-icon {
            width: 22px; height: 22px; border-radius: 4px;
            background: rgba(212,160,84,0.1);
            display: flex; align-items: center; justify-content: center;
            color: #d4a054; font-size: 0.8em; flex-shrink: 0;
            transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        .abstract-card.expanded .expand-icon { transform: rotate(90deg); }

        .abstract-info { flex: 1; min-width: 0; }
        .abstract-name {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.05em; font-weight: 700;
            color: #e2b96a; margin-bottom: 6px;
        }
        .abstract-meta { display: flex; gap: 12px; font-size: 0.78em; color: #6b665e; }
        .abstract-meta .badge { padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.06); }
        .abstract-meta .confirmed { background: rgba(109,168,155,0.15); color: #6da89b; }
        .abstract-meta .draft { background: rgba(184,166,110,0.15); color: #b8a66e; }
        .abstract-desc { margin-top: 10px; color: #a8a299; font-size: 0.88em; line-height: 1.6; }

        .source-facts {
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 14px 20px;
            background: rgba(0,0,0,0.15);
            display: none;
        }
        .abstract-card.expanded .source-facts { display: block; }

        .source-facts-header { font-size: 0.72em; color: #6b665e; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }

        .fact-item {
            padding: 10px 14px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            margin-bottom: 6px;
            border-left: 2px solid transparent;
            transition: all 0.15s;
            cursor: pointer;
        }
        .fact-item:hover { background: rgba(255,255,255,0.04); }
        .fact-item.事件 { border-left-color: #7c99b8; }
        .fact-item.观点 { border-left-color: #6da89b; }
        .fact-item.情绪 { border-left-color: #9d8bb8; }
        .fact-item.资讯 { border-left-color: #b8a66e; }
        .fact-item.决策 { border-left-color: #b8868a; }

        .fact-type { font-size: 0.68em; color: #6b665e; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.04em; }
        .fact-content { font-size: 0.85em; color: #a8a299; line-height: 1.5; }

        /* Detail Panel */
        .detail-panel {
            width: 380px; flex-shrink: 0;
            position: sticky; top: 76px; height: calc(100vh - 96px);
            background: #1e2025;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            overflow: hidden; display: flex; flex-direction: column;
        }
        .detail-header {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .detail-header h3 {
            font-family: 'Playfair Display', Georgia, serif;
            color: #e2b96a; font-size: 1em; font-weight: 700;
        }
        .detail-content { flex: 1; overflow-y: auto; padding: 20px; }
        .detail-content::-webkit-scrollbar { width: 5px; }
        .detail-content::-webkit-scrollbar-track { background: transparent; }
        .detail-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        .detail-empty { text-align: center; padding: 48px 20px; color: #6b665e; }
        .detail-empty .icon { font-size: 2.5em; margin-bottom: 14px; opacity: 0.3; }

        .detail-section { margin-bottom: 22px; }
        .detail-section h4 { font-size: 0.7em; font-weight: 600; color: #6b665e; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
        .detail-section p { color: #a8a299; line-height: 1.7; font-size: 0.92em; }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .stat-box {
            background: rgba(255,255,255,0.03); padding: 14px; border-radius: 8px; text-align: center;
        }
        .stat-box .value { font-family: 'Playfair Display', serif; font-size: 1.6em; font-weight: 700; color: #e2b96a; }
        .stat-box .label { font-size: 0.7em; color: #6b665e; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }

        .privacy-toggle, .privacy-cascade {
            width: 100%; padding: 8px 14px;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
            background: rgba(255,255,255,0.03); color: #a8a299;
            cursor: pointer; font-size: 0.85em; transition: all 0.2s; text-align: center;
        }
        .privacy-toggle:hover, .privacy-cascade:hover { background: rgba(255,255,255,0.06); }
        .privacy-toggle.private, .privacy-cascade.private { border-color: rgba(184,134,138,0.3); background: rgba(184,134,138,0.08); }
        .privacy-toggle.public, .privacy-cascade.public { border-color: rgba(109,168,155,0.3); background: rgba(109,168,155,0.08); }
        .privacy-cascade { font-size: 0.8em; padding: 7px 12px; }

        .summary-stats { display: flex; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
        .summary-stat {
            background: #1e2025; border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px; padding: 16px 22px; text-align: center; min-width: 110px;
        }
        .summary-stat .num { font-family: 'Playfair Display', serif; font-size: 1.8em; font-weight: 700; color: #e2b96a; }
        .summary-stat .txt { font-size: 0.72em; color: #6b665e; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }

        .loading { text-align: center; padding: 80px; color: #6b665e; }
        .spinner {
            width: 32px; height: 32px; border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #d4a054; border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 入场动画 */
        @keyframes fade-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .tree-node { animation: fade-up 0.4s cubic-bezier(0.16,1,0.3,1) both; }
        .tree-node:nth-child(1) { animation-delay: 0.05s; }
        .tree-node:nth-child(2) { animation-delay: 0.1s; }
        .tree-node:nth-child(3) { animation-delay: 0.15s; }
        .tree-node:nth-child(4) { animation-delay: 0.2s; }
        .tree-node:nth-child(5) { animation-delay: 0.25s; }

        @media (max-width: 768px) {
            .main-content { flex-direction: column; }
            .detail-panel { width: 100%; position: static; height: auto; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="/?token=TOKEN_PLACEHOLDER" class="logo">🧠 <span>Brain</span> Visual</a>
        <div class="nav-tabs">
            <a class="nav-tab" id="graphLink" href="#">🕸️ Graph</a>
            <a class="nav-tab active" href="#">🌳 Tree</a>
            <a class="nav-tab" id="timelineLink" href="#">📅 Timeline</a>
        </div>
    </div>

    <div class="main-content">
        <div class="tree-container">
            <div class="tree-header">
                <h1>抽象层视图</h1>
                <p>从具体事实中提炼的规律与模式</p>
            </div>
            <div class="summary-stats" id="summaryStats"></div>
            <div class="tree-root" id="treeRoot">
                <div class="loading"><div class="spinner"></div><p>加载中...</p></div>
            </div>
        </div>

        <div class="detail-panel">
            <div class="detail-header"><h3>规律详情</h3></div>
            <div class="detail-content" id="detailContent">
                <div class="detail-empty">
                    <div class="icon">📐</div>
                    <p>点击左侧抽象层记录查看详情</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const TOKEN = new URLSearchParams(window.location.search).get('token');

        document.querySelector('.logo').href = `/?token=${TOKEN}`;
        document.getElementById('graphLink').href = `/graph?token=${TOKEN}`;
        document.getElementById('timelineLink').href = `/timeline?token=${TOKEN}`;

        let abstracts = [];
        let graphNodes = {};
        let isFullAccess = false;

        async function checkAuth() {
            try {
                const res = await fetch(`${API_BASE}/api/auth/check?token=${TOKEN}`);
                const data = await res.json();
                isFullAccess = data.permissions?.full_access || false;
            } catch (e) { console.error('Auth check failed:', e); }
        }

        async function api(endpoint) {
            const res = await fetch(`${API_BASE}${endpoint}${endpoint.includes('?') ? '&' : '?'}token=${TOKEN}`);
            if (!res.ok) throw new Error('API Error');
            return res.json();
        }

        function renderSummary() {
            const totalFacts = abstracts.reduce((sum, a) => sum + a.source_count, 0);
            document.getElementById('summaryStats').innerHTML = `
                <div class="summary-stat"><div class="num">${abstracts.length}</div><div class="txt">抽象层记录</div></div>
                <div class="summary-stat"><div class="num">${abstracts.filter(a => a.status === 'confirmed').length}</div><div class="txt">已确认</div></div>
                <div class="summary-stat"><div class="num">${totalFacts}</div><div class="txt">溯源事实</div></div>
            `;
        }

        function renderTree() {
            const container = document.getElementById('treeRoot');
            if (abstracts.length === 0) {
                container.innerHTML = `<div class="detail-empty"><div class="icon">📭</div><p>暂无抽象层记录</p><p style="font-size:0.85em;margin-top:10px;color:#6b665e">使用 /abstract scan 扫描候选主题</p></div>`;
                return;
            }
            container.innerHTML = abstracts.map((abstract, idx) => `
                <div class="tree-node">
                    <div class="abstract-card" id="card-${idx}">
                        <div class="abstract-header" onclick="toggleCard(${idx})">
                            <div class="expand-icon">▶</div>
                            <div class="abstract-info">
                                <div class="abstract-name">${abstract.name}</div>
                                <div class="abstract-meta">
                                    <span class="badge ${abstract.status}">${abstract.status === 'confirmed' ? '✓ 已确认' : '草稿'}</span>
                                    <span>${abstract.source_count} 个溯源事实</span>
                                    <span>ID: ${abstract.id}</span>
                                </div>
                                <div class="abstract-desc">${abstract.description}</div>
                            </div>
                        </div>
                        <div class="source-facts" id="facts-${idx}">
                            <div class="source-facts-header">溯源事实</div>
                            <div class="facts-list">${renderFacts(abstract.source_facts)}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderFacts(factIds) {
            if (!factIds || factIds.length === 0) return '<div style="color:#6b665e;font-size:0.85em">无溯源事实</div>';
            return factIds.map(id => {
                const node = graphNodes[id];
                if (!node) return `<div class="fact-item"><div class="fact-content">[${id.slice(0,8)}] 数据未加载</div></div>`;
                return `<div class="fact-item ${node.type || ''}" onclick="showFactDetail('${id}')">
                    <div class="fact-type">${node.type || '未知'} · ${id.slice(0,8)}</div>
                    <div class="fact-content">${node.label}</div>
                </div>`;
            }).join('');
        }

        function toggleCard(idx) {
            document.getElementById(`card-${idx}`).classList.toggle('expanded');
            showAbstractDetail(abstracts[idx]);
        }

        async function showAbstractDetail(abstract) {
            let privacyHtml = '';
            if (isFullAccess) {
                try {
                    const privacyRes = await fetch(`${API_BASE}/api/visual/privacy/${abstract.id}?token=${TOKEN}`);
                    const privacyData = await privacyRes.json();
                    const isPrivate = privacyData.is_private;
                    privacyHtml = `
                        <div class="detail-section"><h4>隐私设置</h4>
                            <button class="privacy-toggle ${isPrivate ? 'private' : 'public'}" onclick="toggleAbstractPrivacy('${abstract.id}', ${!isPrivate}, false)">${isPrivate ? '🔒 私有' : '🌐 公开'}</button>
                            <button class="privacy-cascade ${isPrivate ? 'private' : 'public'}" onclick="toggleAbstractPrivacy('${abstract.id}', ${!isPrivate}, true)" style="margin-top:6px">${isPrivate ? '🔓 公开此规律及全部 ' + abstract.source_count + ' 个溯源事实' : '🔒 私有化此规律及全部 ' + abstract.source_count + ' 个溯源事实'}</button>
                        </div>`;
                } catch (e) { console.error('Privacy check failed:', e); }
            }

            document.getElementById('detailContent').innerHTML = `
                <div class="detail-section"><h4>规律名称</h4><p style="color:#e2b96a;font-size:1.05em;font-weight:600;font-family:'Playfair Display',serif">${abstract.name}</p></div>
                <div class="detail-section"><h4>规律描述</h4><p>${abstract.description || '暂无描述'}</p></div>
                <div class="detail-section"><h4>统计</h4>
                    <div class="stats-grid">
                        <div class="stat-box"><div class="value">${abstract.source_count}</div><div class="label">溯源事实</div></div>
                        <div class="stat-box"><div class="value">${abstract.status === 'confirmed' ? '✓' : '○'}</div><div class="label">${abstract.status === 'confirmed' ? '已确认' : '草稿'}</div></div>
                    </div>
                </div>
                ${privacyHtml}
                <div class="detail-section"><h4>CLI 命令</h4><p style="font-size:0.85em;color:#6b665e"><code style="background:#26282e;padding:3px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace">/abstract view ${abstract.id}</code></p></div>
            `;
        }

        async function toggleAbstractPrivacy(abstractId, setPrivate, cascade) {
            try {
                const res = await fetch(`${API_BASE}/api/visual/privacy?token=${TOKEN}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ entity_id: abstractId, is_private: setPrivate, cascade })
                });
                const data = await res.json();
                if (data.success) {
                    alert(cascade ? `已${setPrivate ? '私有化' : '公开'}规律及 ${data.affected_facts} 个溯源事实` : `已${setPrivate ? '设为私有' : '设为公开'}`);
                    location.reload();
                }
            } catch (e) { console.error('Toggle privacy failed:', e); alert('操作失败，请重试'); }
        }

        function showFactDetail(factId) {
            const node = graphNodes[factId];
            if (!node) return;
            document.getElementById('detailContent').innerHTML = `
                <div class="detail-section"><h4>事实类型</h4><p><span style="background:rgba(255,255,255,0.06);padding:4px 10px;border-radius:4px;font-size:0.85em">${node.type || '未知'}</span></p></div>
                <div class="detail-section"><h4>内容</h4><p style="white-space:pre-wrap;word-break:break-word">${node.full_content || node.label}</p></div>
                <div class="detail-section"><h4>元数据</h4><p style="font-size:0.85em;color:#6b665e">ID: ${factId}<br>连接度: ${node.degree || 0}</p></div>
                <div class="detail-section"><h4>操作</h4><p><a href="/graph?token=${TOKEN}&focus=${factId}" style="color:#e2b96a;text-decoration:none;font-size:0.9em">🕸️ 在 Graph View 中查看</a></p></div>
            `;
        }

        async function init() {
            try {
                await checkAuth();
                const [treeData, graphData] = await Promise.all([api('/api/visual/tree'), api('/api/visual/graph')]);
                abstracts = treeData.abstracts || [];
                graphData.nodes.forEach(n => { graphNodes[n.id] = n; });
                renderSummary();
                renderTree();
            } catch (e) {
                document.getElementById('treeRoot').innerHTML = `<div class="detail-empty"><div class="icon">❌</div><p>加载失败: ${e.message}</p></div>`;
            }
        }

        init();
    </script>
    <script src="/js/chat.js"></script>
</body>
</html>
