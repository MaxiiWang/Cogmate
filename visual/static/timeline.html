<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cogmate Visual - Timeline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #17181c;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
            color: #e8e4dc;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 50% at 15% 5%, rgba(212,160,84,0.03) 0%, transparent 60%),
                radial-gradient(ellipse 50% 70% at 85% 95%, rgba(109,168,155,0.02) 0%, transparent 60%);
            pointer-events: none;
        }

        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; height: 56px;
            background: rgba(30,32,37,0.85);
            backdrop-filter: blur(16px) saturate(1.2);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; padding: 0 24px; z-index: 100;
        }
        .logo { font-family: 'Playfair Display', Georgia, serif; font-size: 1.15em; font-weight: 700; color: #e2b96a; text-decoration: none; }
        .logo span { color: #e8e4dc; font-weight: 500; }
        .nav-tabs { display: flex; margin-left: 36px; gap: 2px; }
        .nav-tab {
            padding: 6px 14px; border-radius: 6px; color: #6b665e;
            cursor: pointer; transition: all 0.15s; text-decoration: none; font-size: 0.85em; font-weight: 500;
        }
        .nav-tab:hover { color: #a8a299; background: rgba(255,255,255,0.04); }
        .nav-tab.active { color: #e2b96a; background: rgba(212,160,84,0.12); }

        .main-content {
            padding-top: 76px; max-width: 900px; margin: 0 auto;
            padding-left: 24px; padding-right: 24px; padding-bottom: 60px;
        }

        .page-header {
            margin-bottom: 28px;
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .page-header h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.6em; font-weight: 700; letter-spacing: -0.02em;
        }
        .page-header p { color: #6b665e; font-size: 0.88em; margin-top: 4px; }

        .filters { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-btn {
            padding: 6px 14px; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px; background: transparent; color: #6b665e;
            cursor: pointer; transition: all 0.15s; font-size: 0.82em;
        }
        .filter-btn:hover { border-color: rgba(212,160,84,0.3); color: #e2b96a; }
        .filter-btn.active { background: rgba(212,160,84,0.12); border-color: rgba(212,160,84,0.2); color: #e2b96a; }

        /* Stats */
        .stats-banner {
            display: flex; gap: 24px; margin-bottom: 28px;
            padding: 16px 20px;
            background: #1e2025; border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
        }
        .stat-item { text-align: center; }
        .stat-item .num { font-family: 'Playfair Display', serif; font-size: 1.5em; font-weight: 700; color: #e2b96a; }
        .stat-item .txt { font-size: 0.72em; color: #6b665e; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.04em; }

        /* Timeline */
        .timeline-container { position: relative; padding-left: 36px; }
        .timeline-line {
            position: absolute; left: 11px; top: 0; bottom: 0; width: 1px;
            background: linear-gradient(to bottom, #d4a054 0%, rgba(255,255,255,0.06) 100%);
        }

        .date-group { margin-bottom: 36px; }
        .date-header { position: relative; margin-bottom: 14px; }
        .date-header::before {
            content: ''; position: absolute;
            left: -31px; top: 50%; transform: translateY(-50%);
            width: 8px; height: 8px; border-radius: 50%;
            background: #d4a054; box-shadow: 0 0 8px rgba(212,160,84,0.3);
        }
        .date-label {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1em; font-weight: 700; color: #e2b96a;
        }
        .date-count { font-size: 0.78em; color: #6b665e; margin-left: 8px; }

        .timeline-items { display: flex; flex-direction: column; gap: 8px; }

        .timeline-item {
            position: relative;
            background: #1e2025;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            padding: 14px 18px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .timeline-item::before {
            content: ''; position: absolute;
            left: -27px; top: 20px;
            width: 4px; height: 4px; border-radius: 50%; background: #6b665e;
        }
        .timeline-item:hover {
            border-color: rgba(255,255,255,0.1);
            background: rgba(30,32,37,1);
            transform: translateX(3px);
        }
        .timeline-item.highlight {
            border-color: rgba(212,160,84,0.2);
            background: rgba(212,160,84,0.03);
        }
        .timeline-item.highlight::before {
            background: #d4a054;
            width: 5px; height: 5px; left: -27.5px;
            box-shadow: 0 0 6px rgba(212,160,84,0.3);
        }

        .item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }

        .type-badge {
            padding: 2px 8px; border-radius: 3px; font-size: 0.72em;
            font-weight: 500; letter-spacing: 0.02em;
        }
        .type-badge.事件 { background: rgba(124,153,184,0.15); color: #7c99b8; }
        .type-badge.观点 { background: rgba(109,168,155,0.15); color: #6da89b; }
        .type-badge.情绪 { background: rgba(157,139,184,0.15); color: #9d8bb8; }
        .type-badge.资讯 { background: rgba(184,166,110,0.15); color: #b8a66e; }
        .type-badge.决策 { background: rgba(184,134,138,0.15); color: #b8868a; }

        .item-time { font-size: 0.75em; color: #6b665e; }
        .highlight-badge {
            padding: 2px 8px; border-radius: 3px; font-size: 0.68em;
            background: rgba(212,160,84,0.12); color: #e2b96a; margin-left: auto;
        }
        .item-content { color: #a8a299; font-size: 0.9em; line-height: 1.6; }
        .item-meta { margin-top: 8px; font-size: 0.75em; color: #6b665e; }

        /* Detail Panel */
        .detail-panel {
            position: fixed; top: 56px; right: 0;
            width: 380px; height: calc(100vh - 56px);
            background: #1e2025;
            border-left: 1px solid rgba(255,255,255,0.06);
            z-index: 90; display: flex; flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
            box-shadow: -12px 0 40px rgba(0,0,0,0.3);
        }
        .detail-panel.open { transform: translateX(0); }

        .detail-header {
            padding: 18px 20px; border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; justify-content: space-between; align-items: center;
        }
        .detail-header h3 { font-family: 'Playfair Display', serif; color: #e2b96a; font-size: 1em; font-weight: 700; }
        .detail-close {
            background: none; border: none; color: #6b665e; font-size: 1.3em; cursor: pointer;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px;
        }
        .detail-close:hover { color: #e8e4dc; background: rgba(255,255,255,0.04); }

        .detail-content { flex: 1; overflow-y: auto; padding: 20px; }
        .detail-content::-webkit-scrollbar { width: 5px; }
        .detail-content::-webkit-scrollbar-track { background: transparent; }
        .detail-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        .detail-section { margin-bottom: 22px; }
        .detail-section h4 { font-size: 0.7em; font-weight: 600; color: #6b665e; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
        .detail-section p { color: #a8a299; line-height: 1.7; font-size: 0.92em; }

        .detail-badge {
            display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 0.82em;
        }
        .detail-badge.事件 { background: rgba(124,153,184,0.15); color: #7c99b8; }
        .detail-badge.观点 { background: rgba(109,168,155,0.15); color: #6da89b; }
        .detail-badge.情绪 { background: rgba(157,139,184,0.15); color: #9d8bb8; }
        .detail-badge.资讯 { background: rgba(184,166,110,0.15); color: #b8a66e; }
        .detail-badge.决策 { background: rgba(184,134,138,0.15); color: #b8868a; }

        .relation-list { display: flex; flex-direction: column; gap: 6px; }
        .relation-item {
            padding: 10px 12px; background: rgba(255,255,255,0.02); border-radius: 6px;
            cursor: pointer; transition: all 0.15s;
        }
        .relation-item:hover { background: rgba(255,255,255,0.04); transform: translateX(2px); }
        .relation-type { font-size: 0.72em; color: #e2b96a; margin-bottom: 3px; }
        .relation-content { font-size: 0.82em; color: #a8a299; }

        .detail-actions { display: flex; gap: 8px; margin-top: 16px; }
        .detail-btn {
            padding: 8px 14px; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px;
            background: transparent; color: #a8a299; cursor: pointer; font-size: 0.82em; transition: all 0.15s;
        }
        .detail-btn:hover { border-color: rgba(212,160,84,0.3); color: #e2b96a; }

        .loading { text-align: center; padding: 80px; color: #6b665e; }
        .spinner {
            width: 32px; height: 32px; border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #d4a054; border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        
        /* 分页 */
        .pagination {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 32px; padding: 16px 20px;
            background: #1e2025; border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
        }
        .pagination-info { font-size: 0.85em; color: #6b665e; }
        .pagination-btns { display: flex; gap: 8px; }
        .page-btn {
            padding: 8px 14px; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px;
            background: transparent; color: #a8a299; cursor: pointer; font-size: 0.82em; transition: all 0.15s;
        }
        .page-btn:hover:not(:disabled) { border-color: rgba(212,160,84,0.3); color: #e2b96a; }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state { text-align: center; padding: 60px; color: #6b665e; }
        .empty-state .icon { font-size: 2.5em; margin-bottom: 14px; opacity: 0.3; }

        /* 入场动画 */
        @keyframes fade-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .date-group { animation: fade-up 0.4s cubic-bezier(0.16,1,0.3,1) both; }
        .date-group:nth-child(1) { animation-delay: 0.05s; }
        .date-group:nth-child(2) { animation-delay: 0.1s; }
        .date-group:nth-child(3) { animation-delay: 0.15s; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="/?token=TOKEN_PLACEHOLDER" class="logo">🧠 <span>Brain</span> Visual</a>
        <div class="nav-tabs">
            <a class="nav-tab" id="graphLink" href="#">🕸️ Graph</a>
            <a class="nav-tab" id="treeLink" href="#">🌳 Tree</a>
            <a class="nav-tab active" href="#">📅 Timeline</a>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <div>
                <h1>时间线</h1>
                <p>按时间顺序回顾知识演变</p>
            </div>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="highlight">关键节点</button>
                <button class="filter-btn" data-filter="事件">事件</button>
                <button class="filter-btn" data-filter="观点">观点</button>
                <button class="filter-btn" data-filter="决策">决策</button>
            </div>
        </div>

        <div class="stats-banner" id="statsBanner"></div>

        <div class="timeline-container">
            <div class="timeline-line"></div>
            <div id="timelineContent">
                <div class="loading"><div class="spinner"></div><p>加载时间线...</p></div>
            </div>
        </div>
        
        <div class="pagination" id="pagination"></div>
    </div>

    <div class="detail-panel" id="detailPanel">
        <div class="detail-header">
            <h3>节点详情</h3>
            <button class="detail-close" onclick="closeDetail()">×</button>
        </div>
        <div class="detail-content" id="detailContent"></div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const TOKEN = new URLSearchParams(window.location.search).get('token');

        document.getElementById('graphLink').href = `/graph?token=${TOKEN}`;
        document.querySelector('.logo').href = '/?token=' + TOKEN;
        document.getElementById('treeLink').href = `/tree?token=${TOKEN}`;

        let facts = [];
        let graphData = { nodes: [], edges: [] };
        let currentFilter = 'all';
        
        // 分页配置
        const PAGE_SIZE = 30;
        let currentPage = 1;
        let filteredFacts = [];

        async function api(endpoint) {
            const res = await fetch(`${API_BASE}${endpoint}${endpoint.includes('?') ? '&' : '?'}token=${TOKEN}`);
            if (!res.ok) throw new Error('API Error');
            return res.json();
        }

        function isHighlightNode(fact) {
            const node = graphData.nodes.find(n => n.id === fact.id || n.id.startsWith(fact.id));
            if (node && node.degree >= 4) return '枢纽节点';
            const isConflictSource = graphData.edges.some(e => (e.source.startsWith(fact.id) || e.target.startsWith(fact.id)) && e.type === '矛盾');
            if (isConflictSource) return '矛盾起点';
            if (fact.type === '决策') return '决策节点';
            return null;
        }

        function renderStats() {
            const typeCount = {};
            facts.forEach(f => { typeCount[f.type] = (typeCount[f.type] || 0) + 1; });
            const highlights = facts.filter(f => isHighlightNode(f)).length;
            document.getElementById('statsBanner').innerHTML = `
                <div class="stat-item"><div class="num">${facts.length}</div><div class="txt">总记录</div></div>
                <div class="stat-item"><div class="num">${highlights}</div><div class="txt">关键节点</div></div>
                ${Object.entries(typeCount).slice(0, 4).map(([type, count]) => `
                    <div class="stat-item"><div class="num">${count}</div><div class="txt">${type}</div></div>
                `).join('')}
            `;
        }

        function renderTimeline() {
            const container = document.getElementById('timelineContent');
            
            // 应用筛选
            if (currentFilter === 'highlight') filteredFacts = facts.filter(f => isHighlightNode(f));
            else if (currentFilter !== 'all') filteredFacts = facts.filter(f => f.type === currentFilter);
            else filteredFacts = [...facts];

            if (filteredFacts.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>没有匹配的记录</p></div>`;
                renderPagination();
                return;
            }

            // 分页
            const totalPages = Math.ceil(filteredFacts.length / PAGE_SIZE);
            currentPage = Math.min(currentPage, totalPages);
            const startIdx = (currentPage - 1) * PAGE_SIZE;
            const pageData = filteredFacts.slice(startIdx, startIdx + PAGE_SIZE);

            // 按日期分组
            const groups = {};
            pageData.forEach(fact => {
                const date = (fact.created_at || fact.timestamp || '').slice(0, 10) || '未知日期';
                if (!groups[date]) groups[date] = [];
                groups[date].push(fact);
            });

            container.innerHTML = Object.keys(groups).sort().reverse().map(date => `
                <div class="date-group">
                    <div class="date-header">
                        <span class="date-label">${formatDate(date)}</span>
                        <span class="date-count">${groups[date].length} 条</span>
                    </div>
                    <div class="timeline-items">${groups[date].map(item => renderItem(item)).join('')}</div>
                </div>
            `).join('');
            
            renderPagination();
        }
        
        function renderPagination() {
            const totalPages = Math.ceil(filteredFacts.length / PAGE_SIZE);
            const paginationEl = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                paginationEl.innerHTML = '';
                return;
            }
            
            paginationEl.innerHTML = `
                <div class="pagination-info">
                    共 ${filteredFacts.length} 条，第 ${currentPage}/${totalPages} 页
                </div>
                <div class="pagination-btns">
                    <button class="page-btn" onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>首页</button>
                    <button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
                    <button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
                    <button class="page-btn" onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>末页</button>
                </div>
            `;
        }
        
        function goToPage(page) {
            const totalPages = Math.ceil(filteredFacts.length / PAGE_SIZE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTimeline();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderItem(item) {
            const highlight = isHighlightNode(item);
            return `
                <div class="timeline-item ${highlight ? 'highlight' : ''}" onclick="showDetail('${item.id}')">
                    <div class="item-header">
                        <span class="type-badge ${item.type || ''}">${item.type || '未知'}</span>
                        <span class="item-time">${item.id}</span>
                        ${highlight ? `<span class="highlight-badge">${highlight}</span>` : ''}
                    </div>
                    <div class="item-content">${item.label}</div>
                    <div class="item-meta">${item.created_at || item.timestamp || ''}</div>
                </div>`;
        }

        function formatDate(dateStr) {
            if (dateStr === '未知日期') return dateStr;
            const today = new Date().toISOString().slice(0, 10);
            const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
            if (dateStr === today) return '今天';
            if (dateStr === yesterday) return '昨天';
            return dateStr;
        }

        function showDetail(id) {
            const fact = facts.find(f => f.id === id);
            if (!fact) return;
            const relatedEdges = graphData.edges.filter(e => e.source.startsWith(id) || e.target.startsWith(id));
            const node = graphData.nodes.find(n => n.id.startsWith(id));

            document.getElementById('detailContent').innerHTML = `
                <div class="detail-section"><h4>类型</h4><span class="detail-badge ${fact.type || ''}">${fact.type || '未知'}</span></div>
                <div class="detail-section"><h4>内容</h4><p style="white-space:pre-wrap;word-break:break-word">${fact.full_content || fact.label}</p></div>
                <div class="detail-section"><h4>元数据</h4><p style="font-size:0.85em;color:#6b665e">ID: ${id}<br>时间: ${fact.created_at || fact.timestamp || '未知'}<br>连接度: ${node?.degree || 0}</p></div>
                ${relatedEdges.length > 0 ? `
                <div class="detail-section"><h4>关联 (${relatedEdges.length})</h4>
                    <div class="relation-list">${relatedEdges.slice(0, 5).map(e => {
                        const otherId = e.source.startsWith(id) ? e.target : e.source;
                        const otherNode = graphData.nodes.find(n => n.id === otherId);
                        return `<div class="relation-item" onclick="showDetail('${otherId.slice(0,8)}')">
                            <div class="relation-type">${e.type || 'RELATES_TO'}</div>
                            <div class="relation-content">${otherNode?.label || otherId.slice(0,8)}</div>
                        </div>`;
                    }).join('')}</div>
                </div>` : ''}
                <div class="detail-actions"><button class="detail-btn" onclick="window.location.href='/graph?token=${TOKEN}&focus=${id}'">🕸️ 在 Graph 中查看</button></div>
            `;
            document.getElementById('detailPanel').classList.add('open');
        }

        function closeDetail() { document.getElementById('detailPanel').classList.remove('open'); }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                currentPage = 1; // 切换筛选时重置到第一页
                renderTimeline();
            });
        });

        async function init() {
            try {
                const [timeline, graph] = await Promise.all([api('/api/visual/timeline'), api('/api/visual/graph')]);
                facts = timeline.facts || [];
                graphData = graph;
                renderStats();
                renderTimeline();
            } catch (e) {
                document.getElementById('timelineContent').innerHTML = `<div class="empty-state"><div class="icon">❌</div><p>加载失败: ${e.message}</p></div>`;
            }
        }

        init();
    </script>
    <script src="/js/chat.js"></script>
</body>
</html>
