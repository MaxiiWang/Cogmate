<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Visual - Globe View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #1a1d23; 
            overflow: hidden; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
        }
        
        #canvas-container { width: 100vw; height: 100vh; }
        
        /* Top Bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(34, 38, 46, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #2a2f38;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
        }
        .logo { font-size: 1.3em; font-weight: bold; color: #e8b86d; }
        .logo span { color: #fff; }
        
        .nav-tabs {
            display: flex;
            margin-left: 40px;
            gap: 5px;
        }
        .nav-tab {
            padding: 8px 20px;
            border-radius: 6px;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .nav-tab:hover { color: #fff; background: rgba(255,255,255,0.1); }
        .nav-tab.active { color: #e8b86d; background: rgba(78, 205, 196, 0.15); }
        
        .stats-bar {
            margin-left: auto;
            display: flex;
            gap: 25px;
            color: #666;
            font-size: 0.85em;
        }
        .stats-bar .stat { display: flex; align-items: center; gap: 6px; }
        .stats-bar .num { color: #e8b86d; font-weight: bold; }
        
        /* Side Panel */
        .side-panel {
            position: fixed;
            top: 60px;
            right: 0;
            width: 350px;
            height: calc(100vh - 60px);
            background: rgba(34, 38, 46, 0.95);
            border-left: 1px solid #2a2f38;
            z-index: 90;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s;
        }
        .side-panel.open { transform: translateX(0); }
        
        .panel-header {
            padding: 20px;
            border-bottom: 1px solid #2a2f38;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-header h3 { color: #e8b86d; font-size: 1em; }
        .panel-close { 
            background: none; border: none; color: #666; 
            cursor: pointer; font-size: 1.5em; 
        }
        .panel-close:hover { color: #fff; }
        
        .panel-content { flex: 1; overflow-y: auto; padding: 20px; }
        
        .node-detail-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .type-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            color: #fff;
        }
        .type-badge.事件 { background: #27ae60; }
        .type-badge.观点 { background: #3498db; }
        .type-badge.情绪 { background: #9b59b6; }
        .type-badge.资讯 { background: #e67e22; }
        .type-badge.决策 { background: #e74c3c; }
        
        .node-content {
            color: #ddd;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .relations-section h4 {
            color: #888;
            font-size: 0.85em;
            margin-bottom: 10px;
        }
        .relation-item {
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .relation-item:hover { background: rgba(255,255,255,0.1); }
        .relation-type {
            font-size: 0.75em;
            color: #e8b86d;
            margin-bottom: 5px;
        }
        .relation-content {
            font-size: 0.9em;
            color: #aaa;
        }
        
        /* Filter Panel */
        .filter-panel {
            position: fixed;
            top: 70px;
            left: 20px;
            background: rgba(34, 38, 46, 0.9);
            border: 1px solid #2a2f38;
            border-radius: 10px;
            padding: 15px;
            z-index: 80;
        }
        .filter-title { color: #888; font-size: 0.8em; margin-bottom: 10px; }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            cursor: pointer;
            color: #aaa;
            transition: color 0.2s;
        }
        .filter-item:hover { color: #fff; }
        .filter-item input { accent-color: #e8b86d; }
        .filter-item.disabled { opacity: 0.4; }
        
        /* Legend */
        .legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(34, 38, 46, 0.9);
            border: 1px solid #2a2f38;
            border-radius: 10px;
            padding: 15px;
            z-index: 80;
        }
        .legend-title { color: #888; font-size: 0.8em; margin-bottom: 10px; }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            color: #aaa;
            font-size: 0.85em;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        /* Controls Help */
        .controls-help {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(34, 38, 46, 0.9);
            border: 1px solid #2a2f38;
            border-radius: 10px;
            padding: 15px;
            z-index: 80;
            color: #666;
            font-size: 0.8em;
        }
        .controls-help div { margin-bottom: 5px; }
        .controls-help kbd {
            background: #2a2f38;
            padding: 2px 6px;
            border-radius: 3px;
            color: #aaa;
        }
        
        /* Loading */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: #1a1d23;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #2a2f38;
            border-top-color: #e8b86d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #666; margin-top: 20px; }
        
        /* Tooltip */
        .tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #3a3f4a;
            border-radius: 6px;
            padding: 10px 15px;
            color: #fff;
            font-size: 0.85em;
            max-width: 300px;
            pointer-events: none;
            z-index: 200;
            display: none;
        }
        .tooltip.show { display: block; }
    </style>
</head>
<body>
    <!-- Loading -->
    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在加载知识图谱...</div>
    </div>
    
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="logo">🧠 <span>Brain</span> Visual</div>
        <div class="nav-tabs">
            <a class="nav-tab active" href="#globe">🌐 Globe</a>
            <a class="nav-tab" id="treeLink" href="#">🌳 Tree</a>
            <a class="nav-tab" id="timelineLink" href="#">📅 Timeline</a>
        </div>
        <div class="stats-bar">
            <div class="stat">节点 <span class="num" id="nodeCount">-</span></div>
            <div class="stat">边 <span class="num" id="edgeCount">-</span></div>
            <div class="stat">矛盾 <span class="num" id="conflictCount">-</span></div>
        </div>
    </div>
    
    <!-- 3D Canvas -->
    <div id="canvas-container"></div>
    
    <!-- Filter Panel -->
    <div class="filter-panel">
        <div class="filter-title">节点类型</div>
        <label class="filter-item"><input type="checkbox" checked data-type="事件"> 事件</label>
        <label class="filter-item"><input type="checkbox" checked data-type="观点"> 观点</label>
        <label class="filter-item"><input type="checkbox" checked data-type="情绪"> 情绪</label>
        <label class="filter-item"><input type="checkbox" checked data-type="资讯"> 资讯</label>
        <label class="filter-item"><input type="checkbox" checked data-type="决策"> 决策</label>
    </div>
    
    <!-- Legend -->
    <div class="legend">
        <div class="legend-title">图例</div>
        <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div> 事件</div>
        <div class="legend-item"><div class="legend-dot" style="background:#3498db"></div> 观点</div>
        <div class="legend-item"><div class="legend-dot" style="background:#9b59b6"></div> 情绪</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div> 资讯</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> 决策</div>
        <div class="legend-item" style="margin-top:10px;border-top:1px solid #3a3f4a;padding-top:10px">
            <div style="width:20px;height:2px;background:#e74c3c"></div> 矛盾关系
        </div>
    </div>
    
    <!-- Controls Help -->
    <div class="controls-help">
        <div><kbd>拖拽</kbd> 旋转视角</div>
        <div><kbd>滚轮</kbd> 缩放</div>
        <div><kbd>点击节点</kbd> 查看详情</div>
    </div>
    
    <!-- Side Panel -->
    <div class="side-panel" id="sidePanel">
        <div class="panel-header">
            <h3>节点详情</h3>
            <button class="panel-close" onclick="closePanel()">×</button>
        </div>
        <div class="panel-content" id="panelContent">
            <!-- Dynamic content -->
        </div>
    </div>
    
    <!-- Tooltip -->
    <div class="tooltip" id="tooltip"></div>
    
    <!-- Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        const API_BASE = window.location.origin;
        const TOKEN = new URLSearchParams(window.location.search).get('token');
        
        // Update nav links with token
        document.getElementById('treeLink').href = `/tree?token=${TOKEN}`;
        document.getElementById('timelineLink').href = `/timeline?token=${TOKEN}`;
        
        // Type colors
        const TYPE_COLORS = {
            '事件': 0x27ae60,
            '观点': 0x3498db,
            '情绪': 0x9b59b6,
            '资讯': 0xe67e22,
            '决策': 0xe74c3c,
            'default': 0x888888
        };
        
        // State
        let graphData = { nodes: [], edges: [] };
        let nodeMeshes = {};
        let edgeLines = [];
        let selectedNode = null;
        let visibleTypes = new Set(['事件', '观点', '情绪', '资讯', '决策']);
        
        // Three.js
        let scene, camera, renderer, controls;
        let raycaster, mouse;
        
        // API
        async function api(endpoint) {
            const res = await fetch(`${API_BASE}${endpoint}${endpoint.includes('?') ? '&' : '?'}token=${TOKEN}`);
            if (!res.ok) throw new Error('API Error');
            return res.json();
        }
        
        // Init Three.js
        function initThree() {
            const container = document.getElementById('canvas-container');
            
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0f);
            
            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 80);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);
            
            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 30;
            controls.maxDistance = 150;
            
            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const pointLight = new THREE.PointLight(0xffffff, 0.8);
            pointLight.position.set(50, 50, 50);
            scene.add(pointLight);
            
            // Raycaster for mouse interaction
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            
            // Events
            window.addEventListener('resize', onResize);
            renderer.domElement.addEventListener('click', onClick);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            
            // Start render loop
            animate();
        }
        
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Create graph visualization
        function createGraph() {
            // Clear existing
            Object.values(nodeMeshes).forEach(m => scene.remove(m));
            edgeLines.forEach(l => scene.remove(l));
            nodeMeshes = {};
            edgeLines = [];
            
            const nodes = graphData.nodes;
            const edges = graphData.edges;
            
            // Create node positions using simple force layout
            const positions = {};
            const RADIUS = 35;
            
            nodes.forEach((node, i) => {
                // Sphere distribution
                const phi = Math.acos(-1 + (2 * i) / nodes.length);
                const theta = Math.sqrt(nodes.length * Math.PI) * phi;
                
                positions[node.id] = {
                    x: RADIUS * Math.cos(theta) * Math.sin(phi),
                    y: RADIUS * Math.sin(theta) * Math.sin(phi),
                    z: RADIUS * Math.cos(phi)
                };
            });
            
            // Create node meshes
            nodes.forEach(node => {
                const pos = positions[node.id];
                const color = TYPE_COLORS[node.type] || TYPE_COLORS.default;
                const size = 1 + Math.min(node.degree || 1, 5) * 0.3;
                
                const geometry = new THREE.SphereGeometry(size, 16, 16);
                const material = new THREE.MeshPhongMaterial({ 
                    color: color,
                    emissive: color,
                    emissiveIntensity: 0.2
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(pos.x, pos.y, pos.z);
                mesh.userData = node;
                
                scene.add(mesh);
                nodeMeshes[node.id] = mesh;
            });
            
            // Create edges
            edges.forEach(edge => {
                const fromPos = positions[edge.source];
                const toPos = positions[edge.target];
                
                if (!fromPos || !toPos) return;
                
                const points = [
                    new THREE.Vector3(fromPos.x, fromPos.y, fromPos.z),
                    new THREE.Vector3(toPos.x, toPos.y, toPos.z)
                ];
                
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const color = edge.type === '矛盾' ? 0xe74c3c : 0x444444;
                const material = new THREE.LineBasicMaterial({ 
                    color: color,
                    transparent: true,
                    opacity: edge.type === '矛盾' ? 0.8 : 0.3
                });
                
                const line = new THREE.Line(geometry, material);
                line.userData = edge;
                scene.add(line);
                edgeLines.push(line);
            });
            
            // Update stats
            document.getElementById('nodeCount').textContent = nodes.length;
            document.getElementById('edgeCount').textContent = edges.length;
            document.getElementById('conflictCount').textContent = 
                edges.filter(e => e.type === '矛盾').length;
        }
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        // Mouse click
        function onClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const meshes = Object.values(nodeMeshes);
            const intersects = raycaster.intersectObjects(meshes);
            
            if (intersects.length > 0) {
                const node = intersects[0].object.userData;
                showNodeDetail(node);
            }
        }
        
        // Mouse move for hover
        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const meshes = Object.values(nodeMeshes);
            const intersects = raycaster.intersectObjects(meshes);
            
            const tooltip = document.getElementById('tooltip');
            
            if (intersects.length > 0) {
                const node = intersects[0].object.userData;
                tooltip.innerHTML = `<strong>[${node.type || '未知'}]</strong><br>${node.label}`;
                tooltip.style.left = (event.clientX + 15) + 'px';
                tooltip.style.top = (event.clientY + 15) + 'px';
                tooltip.classList.add('show');
                document.body.style.cursor = 'pointer';
            } else {
                tooltip.classList.remove('show');
                document.body.style.cursor = 'default';
            }
        }
        
        // Show node detail panel
        async function showNodeDetail(node) {
            selectedNode = node;
            
            // Highlight selected node
            Object.values(nodeMeshes).forEach(m => {
                m.material.emissiveIntensity = 0.2;
            });
            if (nodeMeshes[node.id]) {
                nodeMeshes[node.id].material.emissiveIntensity = 0.8;
            }
            
            // Find related edges
            const relatedEdges = graphData.edges.filter(
                e => e.source === node.id || e.target === node.id
            );
            
            // Render panel
            const typeClass = node.type || '';
            document.getElementById('panelContent').innerHTML = `
                <div class="node-detail-header">
                    <span class="type-badge ${typeClass}">${node.type || '未知'}</span>
                    <span style="color:#666;font-size:0.85em">${node.id}</span>
                </div>
                <div class="node-content">${node.label}</div>
                
                <div class="relations-section">
                    <h4>关联 (${relatedEdges.length})</h4>
                    ${relatedEdges.map(e => {
                        const otherId = e.source === node.id ? e.target : e.source;
                        const otherNode = graphData.nodes.find(n => n.id === otherId);
                        return `
                            <div class="relation-item" onclick="focusNode('${otherId}')">
                                <div class="relation-type">${e.type || 'RELATES_TO'}</div>
                                <div class="relation-content">${otherNode?.label || otherId}</div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
            
            document.getElementById('sidePanel').classList.add('open');
        }
        
        function closePanel() {
            document.getElementById('sidePanel').classList.remove('open');
            // Reset highlight
            Object.values(nodeMeshes).forEach(m => {
                m.material.emissiveIntensity = 0.2;
            });
            selectedNode = null;
        }
        
        function focusNode(nodeId) {
            const node = graphData.nodes.find(n => n.id === nodeId);
            if (node) {
                showNodeDetail(node);
                
                // Move camera towards node
                const mesh = nodeMeshes[nodeId];
                if (mesh) {
                    const pos = mesh.position;
                    controls.target.set(pos.x, pos.y, pos.z);
                }
            }
        }
        
        // Filter handlers
        document.querySelectorAll('.filter-item input').forEach(input => {
            input.addEventListener('change', () => {
                const type = input.dataset.type;
                if (input.checked) {
                    visibleTypes.add(type);
                } else {
                    visibleTypes.delete(type);
                }
                updateVisibility();
            });
        });
        
        function updateVisibility() {
            Object.values(nodeMeshes).forEach(mesh => {
                const type = mesh.userData.type;
                mesh.visible = visibleTypes.has(type) || !type;
            });
        }
        
        // Init
        async function init() {
            try {
                // Load data
                const graph = await api('/api/visual/graph');
                graphData = graph;
                
                // Init Three.js
                initThree();
                
                // Create visualization
                createGraph();
                
                // Hide loading
                document.getElementById('loading').style.display = 'none';
                
            } catch (e) {
                document.getElementById('loading').innerHTML = `
                    <div style="color:#e74c3c;font-size:1.2em">加载失败</div>
                    <div style="color:#666;margin-top:10px">${e.message}</div>
                `;
            }
        }
        
        init();
    </script>
    <!-- Chat Panel -->
    <script src="/js/chat.js"></script>
</body>
</html>
